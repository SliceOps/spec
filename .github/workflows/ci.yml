# SPDX-License-Identifier: MIT
# Recursive dogfooding: SliceOps spec repo runs the SliceOps Layer B.2 CI
# guardrails it publishes. Bootstrap default per P12 (NOT a retrofit).
# Templates: ../../sliceops-toolkit/templates/ci-guardrails/
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Layer B.2 — concurrency cancel-in-progress (dominant cost lever, P12)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Layer B.2 — aggregation-required-gate: single lightweight required check.
  # Markdown-only repo, so a cheap structure smoke test (dogfoods folder structure).
  ci-gate:
    if: github.event.pull_request.draft == false   # Layer B.2 draft-skip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify lightweight structure (per the canonical repo-structure spec)
        run: |
          set -e
          for d in spec reference decisions examples governance; do
            test -d "$d" || { echo "::error::missing top-level folder: $d"; exit 1; }
          done
          test -f README.md && test -f DISCLOSURE.md && test -f GOVERNANCE.md
          echo "structure smoke test: PASS"
      - name: No LICENSE until IP/Legal ratified (intentional gate)
        run: |
          if [ -f LICENSE ]; then
            echo "::notice::LICENSE present — confirm IP/Legal ratification before public release"
          else
            echo "LICENSE intentionally absent (pending IP/Legal); OK"
          fi
