# SPDX-License-Identifier: MIT
# Recursive dogfooding — now REAL (per DR-2026-06-19 dogfooding-enforcement-mandate,
# INS-012, LP-003): the SliceOps spec repo RUNS the consistency validators it
# publishes, fetched from the toolkit (no vendored copy → no drift, per LP-002
# / audit §2.5). A prescribed gate that does not run is a build failure, not a
# header comment.
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Layer B.2 — concurrency cancel-in-progress (dominant cost lever, P9)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Layer B.2 — aggregation-required-gate: single required check.
  ci-gate:
    if: github.event.pull_request.draft == false   # Layer B.2 draft-skip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spec
        uses: actions/checkout@v4
        with:
          path: spec
      - name: Checkout toolkit (the validator engine — fetched, not vendored)
        uses: actions/checkout@v4
        with:
          repository: SliceOps/toolkit
          path: toolkit
          # Same-org repo. Public org: default token suffices. While private,
          # set a read-scoped token here (token: ${{ secrets.TOOLKIT_RO }}).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Lightweight structure smoke test
        working-directory: spec
        run: |
          set -e
          for d in spec reference decisions examples governance; do
            test -d "$d" || { echo "::error::missing top-level folder: $d"; exit 1; }
          done
          test -f README.md && test -f DISCLOSURE.md && test -f GOVERNANCE.md
          # LICENSE is ratified (DR-2026-06-15) — its presence is now REQUIRED,
          # replacing the prior stale "no LICENSE until ratified" gate.
          test -f LICENSE && test -f LICENSE-CODE || { echo "::error::LICENSE/LICENSE-CODE missing (ratified per DR-2026-06-15)"; exit 1; }
          echo "structure: PASS"
      - name: Consistency validators (R-rules — the gate this repo publishes, now enforced)
        run: |
          python3 toolkit/templates/consistency-validators/validators.py \
            --root spec \
            --checks all \
            --topic-taxonomy spec/spec/v1.0.0/topics.md
